<style>
  :root{
    --ink:#1C1C1A;
    --sage:#6B8C72;
    --gold:#B89A68;
    --stone:#9E9185;
    --paper:#FAF8F5;
    --cream:#F5F0E8;
    --serif:'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    --sans:'Jost', 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:44px 22px;
  }
  .card{ width:100%; max-width:700px; }
  .eyebrow{
    text-align:center;
    font-size:13px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--stone);
    margin-bottom:18px;
  }
  .flourish{
    display:flex; align-items:center; justify-content:center;
    gap:14px; margin:0 0 32px 0; color:var(--gold);
  }
  .flourish .line{ height:1px; width:64px; background:var(--stone); opacity:0.4; }
  .flourish .mark{ font-size:14px; color:var(--gold); }
  h1.title{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(30px,5vw,42px);
    text-align:center; line-height:1.25;
    margin:0 0 14px 0;
  }
  p.lede{
    font-family:var(--serif);
    font-style:italic;
    font-size:20px;
    text-align:center;
    color:var(--stone);
    line-height:1.6;
    margin:0 0 40px 0;
  }
  .question{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(26px,4.4vw,32px);
    text-align:center; line-height:1.3;
    margin:0 0 34px 0;
  }
  .options{ display:flex; flex-direction:column; gap:14px; }
  .option{
    display:block; width:100%; text-align:left;
    background:var(--cream);
    border:1px solid rgba(158,145,133,0.35);
    border-left:4px solid transparent;
    border-radius:6px;
    padding:20px 24px;
    font-family:var(--sans);
    font-size:19px;
    line-height:1.45;
    color:var(--ink);
    cursor:pointer;
    transition:border-color 0.25s ease, background 0.25s ease, transform 0.15s ease;
    min-height:66px;
  }
  .option:hover{ border-left-color:var(--sage); background:#f0ece3; }
  .option:active{ transform:scale(0.995); }
  .option:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .option.quiet{
    background:transparent;
    border-style:dashed;
    color:var(--stone);
    font-size:17px;
  }
  .option.quiet:hover{ color:var(--ink); border-left-color:var(--stone); background:var(--cream); }

  .nav-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:26px; min-height:22px;
  }
  .nav-link{
    background:none; border:none;
    color:var(--stone);
    font-family:var(--sans); font-size:15px; letter-spacing:0.04em;
    cursor:pointer; padding:8px 4px;
    text-decoration:underline; text-decoration-color:transparent;
    transition:text-decoration-color 0.2s ease, color 0.2s ease;
  }
  .nav-link:hover{ color:var(--ink); text-decoration-color:var(--stone); }
  .nav-link:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .nav-link.invisible{ visibility:hidden; }

  .progress{ display:flex; justify-content:center; gap:8px; margin-bottom:30px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:rgba(158,145,133,0.35); }
  .dot.active{ background:var(--gold); }

  .start-btn{
    display:block; margin:0 auto;
    background:var(--ink); color:var(--paper);
    font-family:var(--sans); font-size:17px; letter-spacing:0.04em;
    border:none; border-radius:4px;
    padding:18px 42px; cursor:pointer;
    transition:background 0.25s ease;
  }
  .start-btn:hover{ background:var(--sage); }
  .start-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

  /* Interstitial */
  .beat{
    text-align:center;
    font-family:var(--serif);
    font-style:italic;
    font-size:24px;
    color:var(--stone);
    line-height:1.6;
    padding:60px 0;
  }

  /* Result screen */
  .result-numeral{
    font-family:var(--serif);
    font-size:15px; letter-spacing:0.16em;
    color:var(--gold); text-transform:uppercase;
    text-align:center;
  }
  .result-title{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(28px,4.6vw,36px);
    text-align:center;
    margin:4px 0 10px 0;
  }
  .result-instruction{
    text-align:center; font-size:16px; color:var(--stone);
    margin-bottom:28px; letter-spacing:0.02em; line-height:1.5;
  }
  .songs{ display:flex; flex-direction:column; gap:12px; margin-bottom:26px; }
  .song-card{
    background:var(--cream); border-radius:6px; padding:20px 26px;
  }
  .song-card.primary{ border-left:4px solid var(--sage); }
  .song-card.alt{ border-left:4px solid rgba(158,145,133,0.45); }
  .song-card .label{
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--stone); margin-bottom:5px;
  }
  .song-card .name{
    font-family:var(--serif);
    font-size:23px; font-weight:500; color:var(--ink);
    margin-bottom:4px;
  }
  .song-card .sub{
    font-family:var(--serif);
    font-style:italic;
    font-size:16.5px;
    color:var(--stone);
    line-height:1.5;
  }
  .secondary-note{
    background:transparent;
    border:1px dashed rgba(158,145,133,0.5);
    border-radius:6px;
    padding:18px 24px;
    margin-bottom:28px;
    font-size:16px;
    color:var(--stone);
    line-height:1.55;
    text-align:center;
  }
  .secondary-note b{ color:var(--ink); font-weight:500; }
  .closing-line{
    text-align:center;
    font-family:var(--serif); font-style:italic;
    font-size:18px; color:var(--stone);
    margin-bottom:32px; line-height:1.6;
  }
  .restart-row{ text-align:center; display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .ghost-btn{
    background:none; border:1px solid var(--stone);
    color:var(--ink);
    font-family:var(--sans); font-size:15px; letter-spacing:0.04em;
    border-radius:4px; padding:14px 28px; cursor:pointer;
    transition:border-color 0.25s ease, background 0.25s ease;
  }
  .ghost-btn:hover{ border-color:var(--sage); background:var(--cream); }
  .ghost-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* Browse screen */
  .browse-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:30px; }
  .browse-item{
    background:var(--cream);
    border-left:3px solid rgba(158,145,133,0.4);
    border-radius:5px;
    padding:16px 22px;
  }
  .browse-item .name{
    font-family:var(--serif); font-size:21px; font-weight:500;
  }
  .browse-item .sub{
    font-family:var(--serif); font-style:italic;
    font-size:15.5px; color:var(--stone); line-height:1.5;
    margin-top:2px;
  }

  .fade-in{ animation:fadeIn 0.4s ease both; }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .fade-in{ animation:none; }
  }
</style>
</head>

    ]
  },
  IX: {

    allSongs: ["The First Few Days","We Didn't Get to Say Goodbye","The Day That Didn't Wait","Too Soon","I Don't Know How to Do This Yet","The Space Between the Knowing and the Feeling","Where Do We Put the Anger","Still Here, Still Broken","Not Yet Ready for the Light","Somehow We Will Find the Morning","Even in the Dark, Love Stays"],
    options: [
      { label: "We're still going through the motions, numb", song: "The First Few Days", alts: ["The Space Between the Knowing and the Feeling","I Don't Know How to Do This Yet"] },
      { label: "We never got to say goodbye", song: "We Didn't Get to Say Goodbye", alts: ["The Day That Didn't Wait","Too Soon"] },
      { label: "We're angry, and no one will let us say it", song: "Where Do We Put the Anger", alts: ["Not Yet Ready for the Light","Still Here, Still Broken"] },
      { label: "We're functioning outside, breaking inside", song: "Still Here, Still Broken", alts: ["I Don't Know How to Do This Yet","Not Yet Ready for the Light"] },
      { label: "We're starting to believe we'll carry this forward", song: "Somehow We Will Find the Morning", alts: ["Even in the Dark, Love Stays","Too Soon"] }
    ]
  },
  X: {
    numeral: "Volume X", title: "Hope, Heaven & Reunion",
    allSongs: ["I Will Know Your Face Again","Waiting on the Other Shore","Heaven Has Another Name Now","The Long Hello","Every Tear Returned as Joy","Where Goodbyes Have No Meaning","The Welcome Home","We Will Find Each Other There","Not Goodbye — Not Ever","The Morning That Never Ends"],
    options: [
      { label: "I will see and know their face again", song: "I Will Know Your Face Again", alts: ["The Long Hello","Not Goodbye — Not Ever"] },
      { label: "A peaceful crossing to the other shore", song: "Waiting on the Other Shore", alts: ["The Welcome Home","The Morning That Never Ends"] },
      { label: "Heaven feels nearer because they're there", song: "Heaven Has Another Name Now", alts: ["Waiting on the Other Shore","The Long Hello"] },
      { label: "Our whole family, gathered again", song: "We Will Find Each Other There", alts: ["Every Tear Returned as Joy","Where Goodbyes Have No Meaning"] },
      { label: "Goodbye is not the last word", song: "Not Goodbye — Not Ever", alts: ["Where Goodbyes Have No Meaning","The Welcome Home"] }
    ]
  }
};

/* =========================================================
   QUESTIONS & ROUTING
   ========================================================= */

const Q1_OPTIONS = [
  { value: "spouse", label: "A spouse or partner" },
  { value: "parent", label: "A parent or grandparent" },
  { value: "child",  label: "A child" },
  { value: "served", label: "Someone who served — military or first responder" },
  { value: "other",  label: "Someone else dear to us" }
];

const Q2_OPTIONS = [
  { value: "sudden",    label: "Sit with us in the shock — it happened without warning" },
  { value: "celebrate", label: "Celebrate a life that was fully lived" },
  { value: "scripture", label: "Speak our faith and the scriptures we hold" },
  { value: "hope",      label: "Hold the promise that we will see them again" },
  { value: "true",      label: "Just tell the truth about losing them" }
];

const REL_VOLUME = { spouse: "VII", parent: "VIII", served: "V", child: "VI", other: null };

// Returns { primary, secondary } volume keys. Secondary may be null.
function resolveVolumes(q1, q2){
  const rel = REL_VOLUME[q1];

  // Child path: skips Q2 entirely. Primary VI, secondary X.
  if (q1 === "child") return { primary: "VI", secondary: "X" };

  if (q2 === "sudden")    return { primary: "IX", secondary: rel || "III" };
  if (q2 === "celebrate") return { primary: "IV", secondary: rel || "III" };
  if (q2 === "scripture") return { primary: "II", secondary: rel || "X" };
  if (q2 === "hope")      return { primary: "X",  secondary: rel || "II" };
  // q2 === "true": route by relationship; "other" gets III with I as the backup
  if (rel) return { primary: rel, secondary: null };
  return { primary: "III", secondary: "I" };
}

/* =========================================================
   STATE & NAVIGATION
   ========================================================= */

let state = {
  history: ["intro"],
  q1: null, q2: null,
  primary: null, secondary: null,
  q3choice: null
};
let beatTimer = null;

function currentScreen(){ return state.history[state.history.length - 1]; }

function go(screen){ state.history.push(screen); render(); }

function back(){
  if (beatTimer){ clearTimeout(beatTimer); beatTimer = null; }
  if (state.history.length > 1){
    // never land back on the transient beat screen
    do { state.history.pop(); }
    while (currentScreen() === "beat" && state.history.length > 1);
    const prev = currentScreen();
    if (prev === "intro"){ state.q1 = null; state.q2 = null; state.primary = null; state.secondary = null; state.q3choice = null; }
    if (prev === "q1"){ state.q2 = null; state.primary = null; state.secondary = null; state.q3choice = null; }
    if (prev === "q2" || prev === "q3"){ state.q3choice = null; }
    render();
  }
}

function restart(){
  if (beatTimer){ clearTimeout(beatTimer); beatTimer = null; }
  state = { history: ["intro"], q1: null, q2: null, primary: null, secondary: null, q3choice: null };
  render();
}

function selectQ1(value){
  state.q1 = value;
  if (value === "child"){
    const r = resolveVolumes(value, null);
    state.primary = r.primary; state.secondary = r.secondary;
    go("q3");
  } else {
    go("q2");
  }
}

function selectQ2(value){
  state.q2 = value;
  const r = resolveVolumes(state.q1, value);
  state.primary = r.primary; state.secondary = r.secondary;
  go("q3");
}

function selectQ3(index){
  state.q3choice = index;
  go("beat");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  beatTimer = setTimeout(() => {
    beatTimer = null;
    // replace beat with result so Back never returns to the beat
    state.history.pop();
    go("result");
  }, reduced ? 500 : 1400);
}

function browseVolume(){ go("browse"); }

/* =========================================================
   RENDER HELPERS
   ========================================================= */

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function flourish(){
  return '<div class="flourish"><span class="line"></span><span class="mark">&#10022;</span><span class="line"></span></div>';
}

function navRow(showBack){
  return `<div class="nav-row">
    <button class="nav-link ${showBack ? "" : "invisible"}" onclick="back()">&#8592; Back</button>
    <button class="nav-link ${state.history.length > 1 ? "" : "invisible"}" onclick="restart()">Start over</button>
  </div>`;
}

function progressDots(activeIndex){
  const total = (state.q1 === "child") ? 2 : 3;
  let dots = "";
  for (let i = 0; i < total; i++){
    dots += `<span class="dot ${i === activeIndex ? "active" : ""}"></span>`;
  }
  return `<div class="progress">${dots}</div>`;
}

function songCard(title, labelText, cls){
  return `<div class="song-card ${cls}">
    <div class="label">${labelText}</div>
    <div class="name">${esc(title)}</div>
    <div class="sub">${esc(SONGS[title] || "")}</div>
  </div>`;
}

function secondaryNote(){
  if (!state.secondary) return "";
  const sec = VOLUMES[state.secondary];
  return `<div class="secondary-note">
    If nothing here says what you need said, <b>${sec.numeral} — ${esc(sec.title)}</b> may also hold what you're looking for.
  </div>`;
}

/* =========================================================
   RENDER
   ========================================================= */

function render(){
  const app = document.getElementById("app");
  const screen = currentScreen();

  if (screen === "intro"){
    app.innerHTML = `
      <div class="fade-in">
        <div class="eyebrow">Even in the Night, Love Remains</div>
        ${flourish()}
        <h1 class="title">Find Your Way to a Song</h1>
        <p class="lede">A few gentle questions to help narrow the collection.<br>Take your time. There's no hurry here.</p>
        <button class="start-btn" onclick="go('q1')">Begin</button>
      </div>`;
    return;
  }

  if (screen === "q1"){
    app.innerHTML = `
      <div class="fade-in">
        ${navRow(true)}
        ${progressDots(0)}
        <div class="question">Who are we honoring today?</div>
        <div class="options">
          ${Q1_OPTIONS.map(o => `<button class="option" onclick="selectQ1('${o.value}')">${esc(o.label)}</button>`).join("")}
        </div>
      </div>`;
    return;
  }

  if (screen === "q2"){
    app.innerHTML = `
      <div class="fade-in">
        ${navRow(true)}
        ${progressDots(1)}
        <div class="question">What do you most need the song to do?</div>
        <div class="options">
          ${Q2_OPTIONS.map(o => `<button class="option" onclick="selectQ2('${o.value}')">${esc(o.label)}</button>`).join("")}
        </div>
      </div>`;
    return;
  }

  if (screen === "q3"){
    const vol = VOLUMES[state.primary];
    const stepIndex = (state.q1 === "child") ? 1 : 2;
    app.innerHTML = `
      <div class="fade-in">
        ${navRow(true)}
        ${progressDots(stepIndex)}
        <div class="question">Which feels closest to where you are?</div>
        <div class="options">
          ${vol.options.map((o, i) => `<button class="option" onclick="selectQ3(${i})">${esc(o.label)}</button>`).join("")}
          <button class="option quiet" onclick="browseVolume()">None of these quite fit — show me all the songs in this volume</button>
        </div>
      </div>`;
    return;
  }

  if (screen === "beat"){
    app.innerHTML = `
      <div class="fade-in">
        <div class="beat">Thank you.<br>Here is where we would start.</div>
      </div>`;
    return;
  }

  if (screen === "result"){
    const vol = VOLUMES[state.primary];
    const choice = vol.options[state.q3choice];
    app.innerHTML = `
      <div class="fade-in">
        ${navRow(true)}
        <div class="result-numeral">${vol.numeral}</div>
        <div class="result-title">${esc(vol.title)}</div>
        <div class="result-instruction">Open to this volume in the book.<br>Here are a few songs to look for:</div>
        <div class="songs">
          ${songCard(choice.song, "Start here", "primary")}
          ${choice.alts.map(a => songCard(a, "You might also look at", "alt")).join("")}
        </div>
        ${secondaryNote()}
        <div class="closing-line">You don't need to choose quickly.<br>Read each one until something says what you need said today.</div>
        <div class="restart-row">
          <button class="ghost-btn" onclick="browseVolume()">See all songs in this volume</button>
          <button class="ghost-btn" onclick="restart()">Start over</button>
        </div>
      </div>`;
    return;
  }

  if (screen === "browse"){
    const vol = VOLUMES[state.primary];
    app.innerHTML = `
      <div class="fade-in">
        ${navRow(true)}
        <div class="result-numeral">${vol.numeral}</div>
        <div class="result-title">${esc(vol.title)}</div>
        <div class="result-instruction">Every song in this volume. Read slowly — one of these may already know your name.</div>
        <div class="browse-list">
          ${vol.allSongs.map(t => `
            <div class="browse-item">
              <div class="name">${esc(t)}</div>
              <div class="sub">${esc(SONGS[t] || "")}</div>
            </div>`).join("")}
        </div>
        ${secondaryNote()}
        <div class="restart-row">
          <button class="ghost-btn" onclick="restart()">Start over</button>
        </div>
      </div>`;
    return;
  }
}

render();
</script>
